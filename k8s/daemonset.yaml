---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: o11y
  namespace: monitoring
  labels:
    app: o11y
spec:
  selector:
    matchLabels:
      app: o11y
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: o11y
    spec:
      # Expose host PID namespace so procwatch sees all node processes
      hostPID: true
      # Expose host network namespace so netwatch sees real interfaces
      hostNetwork: true

      # Tolerate control-plane/master taints so the DaemonSet runs everywhere
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      containers:
        - name: o11y
          # imagePullPolicy: Never tells Kubernetes to use the local image.
          # For kind:    kind load docker-image o11y:latest
          # For minikube: minikube image load o11y:latest
          # For Docker Desktop K8s: docker build is sufficient
          image: o11y:latest
          imagePullPolicy: Never

          # Container stays alive; exec in to run any tool.
          command: ["sleep", "infinity"]

          securityContext:
            runAsUser: 0          # root required to read /proc/<pid>/fd for other procs
            capabilities:
              add:
                - NET_RAW         # required by netlatency (raw ICMP sockets)
                - SYS_PTRACE      # required to read /proc/<pid>/ entries of other procs

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          volumeMounts:
            # Mount the host's /proc so tools read node-level metrics,
            # not container-scoped metrics.
            - name: host-proc
              mountPath: /proc
              readOnly: true
            # Mount the host's /sys for block device stats (use, fdwatch).
            - name: host-sys
              mountPath: /sys
              readOnly: true

      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
